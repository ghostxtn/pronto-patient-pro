upstream api_upstream {
    server api:3000;
}

server {
    listen 80;
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;
    server_name _;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    location /uploads/avatars/ {
        proxy_pass http://api_upstream/uploads/avatars/;
        proxy_set_header Host $host;
        
        # Cache avatarlar
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /uploads/specializations/ {
        proxy_pass http://api_upstream/uploads/specializations/;
        proxy_set_header Host $host;

        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location /uploads/appointments/ {
        default_type application/json;
        return 403 '{"message":"Forbidden"}';
    }

    location /api/ {
        proxy_pass http://api_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 502 '{"message":"Frontend not deployed yet"}';
        add_header Content-Type application/json;
    }
}
